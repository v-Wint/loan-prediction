<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Loan Prediction{% endblock %}</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: monospace;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }
        input, select, textarea {
            background-color: #222;
            color: white;
            border: 1px solid #555;
            padding: 4px 8px;
        }
        button {
            background-color: #333;
            color: white;
            border: 1px solid #555;
            padding: 6px 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #444;
        }
        a {
            color: #aaa;
        }
        a:hover {
            color: white;
        }
        h1, h2 {
            border-bottom: 1px solid #333;
            padding-bottom: 6px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            text-align: left;
            padding: 6px 10px;
            border-bottom: 1px solid #333;
        }
        th {
            color: #aaa;
        }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'home' %}">Home</a> |
        <a href="{% url 'loan-create' %}">New Loan</a> |
        <a href="{% url 'borrower-create' %}">New Borrower</a>
    </nav>
    <hr>
    {% block content %}{% endblock %}
</body>
</html>
